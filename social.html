<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YoungDollazz | Link Page</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-accent: #8b5cf6;
            --secondary-accent: #ec4899;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-hover: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid transparent;
            background: linear-gradient(var(--primary-accent), var(--secondary-accent)) border-box;
            -webkit-mask:
                linear-gradient(#fff 0 0) padding-box, 
                linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            padding: 3px;
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.4);
            transition: transform 0.3s ease;
        }

        .profile-wrapper:hover .profile-img {
            transform: scale(1.05);
        }

        .profile-img-inner {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 104px;
            height: 104px;
            border-radius: 50%;
            object-fit: cover;
            z-index: -1;
        }

        .artist-name {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            text-transform: uppercase;
            text-align: center;
            background: linear-gradient(to right, #fff, #d8b4fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bio {
            font-size: 0.95rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 25px;
            font-weight: 400;
            line-height: 1.5;
        }

        .social-icons {
            display: flex;
            gap: 20px;
            margin-bottom: 35px;
        }

        .social-icon {
            color: var(--text-main);
            font-size: 1.4rem;
            text-decoration: none;
            transition: all 0.3s ease;
            opacity: 0.8;
        }

        .social-icon:hover {
            opacity: 1;
            transform: translateY(-3px) scale(1.1);
            color: var(--primary-accent);
            text-shadow: 0 0 15px rgba(139, 92, 246, 0.6);
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 18px 24px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        .link-item.featured {
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.4);
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(139, 92, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); }
        }

        .link-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .link-item:hover::before {
            transform: translateX(100%);
        }

        .link-item:hover {
            background: var(--glass-hover);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .link-icon-left {
            font-size: 1.3rem;
            width: 30px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .link-text {
            flex-grow: 1;
            text-align: center;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        .link-icon-right {
            font-size: 1rem;
            width: 30px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .link-item:hover .link-icon-right {
            opacity: 1;
            transform: translateX(0);
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            opacity: 0.6;
        }

        .link-item {
            opacity: 0;
            animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        ::-webkit-scrollbar {
            width: 9px;
            background: rgba(16,12,41, 0.4);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary-accent) 30%, var(--secondary-accent) 70%);
            border-radius: 6px;
            border: 2px solid rgba(15,12,41,0.5);
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.12);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, var(--secondary-accent), var(--primary-accent));
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
        }

        html {
            scrollbar-color: #8b5cf6 #20123e;
            scrollbar-width: thin;
        }

        body {
            scrollbar-color: #8b5cf6 #0f0c29;
            scrollbar-width: thin;
        }

        .links-container .link-item {
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
    <script>
    document.addEventListener('DOMContentLoaded', function() {

        let delay = 0.2;
        linkItems.forEach((item, idx) => {
            item.style.animationDelay = delay + idx * 0.1 + 's';
        });
    });
    </script>
